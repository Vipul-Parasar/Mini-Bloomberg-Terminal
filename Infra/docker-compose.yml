  #     KAFKA_BOOTSTRAP_SERVERS: kafka:29092
  #     CONFIG_PATH: /app/config/config.json
  #   volumes:
  #     - ../data_ingestion:/app
  #   networks:
  #     - kafka-net
  #   # command: ["python","data_ingestion.py"]

networks:
  kafka-net:
    driver: bridge